## Docker Compose configuration file for local development environment
services:

    # PostgreSQL container
    postgres:
        image: postgres:17.2-alpine
        container_name: postgres
        restart: unless-stopped
        ports:
            - '5432:5432'
        volumes:
            - postgres-data:/var/lib/postgresql/data
        environment:
            POSTGRES_USER: film
            POSTGRES_PASSWORD: film
            POSTGRES_DB: film
        healthcheck:
            test: [ 'CMD', 'pg_isready', '-U', 'postgres' ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    # Application container (Server)
    grpc-server:
        container_name: grpc-server
        restart: unless-stopped
        build:
            context: .
            dockerfile: Dockerfile
            target: grpc-server
        depends_on:
            postgres:
                condition: service_healthy
        ports:
            - '8080:8080'
        environment:
            SPRING_DATASOURCE_HOST: postgres
            SPRING_DATASOURCE_PORT: 5432
            SPRING_DATASOURCE_DATABASE: film
            SPRING_DATASOURCE_USERNAME: film
            SPRING_DATASOURCE_PASSWORD: film
        healthcheck:
            test: [ 'CMD', '/bin/grpc_health_probe', '-addr=:8080' ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 15s

    # Application container (Client)
    grpc-client:
        container_name: grpc-client
        restart: no
        build:
            context: .
            dockerfile: Dockerfile
            target: grpc-client
        depends_on:
            grpc-server:
                condition: service_healthy
        environment:
            GRPC_SERVER_HOST: grpc-server
            GRPC_SERVER_PORT: 8080

## Volumes
volumes:
    postgres-data: